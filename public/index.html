<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CodeCharter</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="map-shell" aria-labelledby="appTitle">
      <h1 id="appTitle" class="sr-only">CodeCharter Map</h1>
      <section class="map-area">
        <canvas id="mapCanvas"></canvas>

        <div class="map-tool-palette" role="toolbar" aria-label="Map tools">
          <div class="tool-group tool-group-primary" role="group" aria-label="Primary map tools">
            <button id="selectTool" class="icon-tool active" type="button" title="Select" aria-label="Select" aria-pressed="true">
              <svg class="lucide lucide-mouse-pointer-2" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="m4 4 7.07 17 2.51-7.39L21 11.07z"></path>
              </svg>
            </button>
            <button id="panTool" class="icon-tool" type="button" title="Pan" aria-label="Pan" aria-pressed="false">
              <svg class="lucide lucide-hand" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path>
                <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"></path>
                <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"></path>
                <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.9-6.4-2.8L2 15.6a2 2 0 0 1 2.8-2.8L7 15"></path>
              </svg>
            </button>
            <button id="drawTool" class="icon-tool" type="button" title="Draw Selection" aria-label="Draw Selection" aria-pressed="false">
              <svg class="lucide lucide-square-dashed-mouse-pointer" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M12.034 12.681a.498.498 0 0 1 .647-.647l9 3.5a.5.5 0 0 1-.033.943l-3.444 1.068a1 1 0 0 0-.66.66l-1.067 3.443a.5.5 0 0 1-.943.033z"></path>
                <path d="M5 3a2 2 0 0 0-2 2"></path>
                <path d="M19 3a2 2 0 0 1 2 2"></path>
                <path d="M5 21a2 2 0 0 1-2-2"></path>
                <path d="M9 3h1"></path>
                <path d="M9 21h2"></path>
                <path d="M14 3h1"></path>
                <path d="M3 9v1"></path>
                <path d="M21 9v2"></path>
                <path d="M3 14v1"></path>
              </svg>
            </button>
            <label class="icon-tool toggle-tool" title="Activity & Discovery" aria-label="Activity & Discovery">
              <input id="showActivity" class="sr-only" type="checkbox">
              <svg class="lucide lucide-eye" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </label>
          </div>
          <details class="map-action-menu">
            <summary class="icon-tool menu-trigger" role="button" title="More map actions" aria-label="More map actions" aria-expanded="false">
              <svg class="lucide lucide-ellipsis" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <circle cx="12" cy="12" r="1"></circle>
                <circle cx="19" cy="12" r="1"></circle>
                <circle cx="5" cy="12" r="1"></circle>
              </svg>
            </summary>
            <div class="map-action-panel" role="group" aria-label="Camera and history actions">
              <button id="zoomInTool" class="icon-tool" type="button" title="Zoom in" aria-label="Zoom in">
                <svg class="lucide lucide-plus" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M5 12h14"></path>
                  <path d="M12 5v14"></path>
                </svg>
              </button>
              <button id="zoomOutTool" class="icon-tool" type="button" title="Zoom out" aria-label="Zoom out">
                <svg class="lucide lucide-minus" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M5 12h14"></path>
                </svg>
              </button>
              <button id="resetViewTool" class="icon-tool" type="button" title="Fit codebase" aria-label="Fit codebase">
                <svg class="lucide lucide-maximize" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
                  <path d="M21 8V5a2 2 0 0 0-2-2h-3"></path>
                  <path d="M3 16v3a2 2 0 0 0 2 2h3"></path>
                  <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
                </svg>
              </button>
              <button id="clearActivityTool" class="icon-tool danger-action hold-action" type="button" title="Hold to clear activity history" aria-label="Clear activity history">
                <svg class="lucide lucide-trash-2" xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <path d="M3 6h18"></path>
                  <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  <path d="M19 6 18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                  <path d="M10 11v6"></path>
                  <path d="M14 11v6"></path>
                </svg>
              </button>
            </div>
          </details>
        </div>

        <div id="selectionPopover" class="selection-popover" hidden>
          <div id="selectionContext" class="selection-context" aria-live="polite"></div>
          <textarea id="selectionComment" name="annotationComment" rows="4" autocomplete="off" placeholder="Ask Codex or leave a comment…" aria-label="Annotation comment"></textarea>
          <div class="selection-actions">
            <button id="saveSelection" type="button" disabled>Save &amp; Copy Prompt</button>
            <button id="deleteAnnotation" class="danger-action" type="button" hidden>Delete</button>
          </div>
          <div id="selectionStatus" class="sr-only" role="status" aria-live="polite"></div>
        </div>

        <div id="annotationActions" class="annotation-actions" hidden>
          <div class="annotation-summary">
            <strong id="annotationTitle">Map annotation</strong>
            <span id="annotationMeta"></span>
          </div>
          <div id="annotationFeedback" class="annotation-feedback" role="status" aria-live="polite" hidden></div>
          <div class="annotation-action-buttons">
            <button id="copyAnnotationPrompt" type="button">Copy Prompt</button>
            <button id="editAnnotation" type="button">Edit</button>
            <button id="deleteAnnotationAction" class="danger-action" type="button">Delete</button>
          </div>
        </div>

        <footer class="map-status">
          <div id="hoverReadout">Move over the map</div>
          <div id="viewportReadout"></div>
        </footer>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
