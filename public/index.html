<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codemaps</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="map-shell">
      <section class="map-area">
        <canvas id="mapCanvas"></canvas>

        <div class="map-tool-palette" aria-label="Map tools">
          <button id="drawTool" class="icon-tool square-tool" type="button" title="Draw geohash selection" aria-label="Draw geohash selection" aria-pressed="false"></button>
        </div>

        <div id="selectionPopover" class="selection-popover" hidden>
          <textarea id="selectionComment" rows="4" placeholder="Ask Codex or leave a comment" aria-label="Annotation comment"></textarea>
          <button id="saveSelection" type="button" disabled>Save and copy deep link</button>
        </div>

        <footer class="map-status">
          <div id="hoverReadout">Move over the map</div>
          <div id="viewportReadout"></div>
        </footer>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
